name: Validate Grove Structure

on:
  pull_request:
    paths:
      - 'groves/**'
      - 'GROVES.md'

permissions:
  contents: read

jobs:
  validate:
    name: Grove Structure Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed Groves
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep '^groves/' | cut -d'/' -f2 | sort -u)
          echo "groves=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed groves: $CHANGED"

      - name: Validate Grove structure
        run: |
          set -e
          REQUIRED_FILES="README.md MANIFEST.md CONFIG.md HISTORY.md STATUS.md"
          ERRORS=0

          for grove in ${{ steps.changed.outputs.groves }}; do
            GROVE_PATH="groves/$grove"
            echo ""
            echo "Checking: $GROVE_PATH"

            if [[ ! -d "$GROVE_PATH" ]]; then
              echo "  SKIP — directory not found (may have been deleted)"
              continue
            fi

            for f in $REQUIRED_FILES; do
              if [[ -f "$GROVE_PATH/$f" ]]; then
                echo "  ✓ $f"
              else
                echo "  ✗ MISSING: $f"
                ERRORS=$((ERRORS + 1))
              fi
            done

            # Tree declared in MANIFEST.md?
            if [[ -f "$GROVE_PATH/MANIFEST.md" ]]; then
              if grep -q "Tree" "$GROVE_PATH/MANIFEST.md"; then
                echo "  ✓ Tree declared in MANIFEST.md"
              else
                echo "  ✗ No tree declared in MANIFEST.md"
                ERRORS=$((ERRORS + 1))
              fi
            fi

            # At least one Turn in HISTORY.md?
            if [[ -f "$GROVE_PATH/HISTORY.md" ]]; then
              if grep -q "^## Turn" "$GROVE_PATH/HISTORY.md"; then
                TURN_COUNT=$(grep -c "^## Turn" "$GROVE_PATH/HISTORY.md" || true)
                echo "  ✓ $TURN_COUNT turn(s) in HISTORY.md"
              else
                echo "  ✗ No turns recorded in HISTORY.md"
                ERRORS=$((ERRORS + 1))
              fi
            fi

            # Grove registered in GROVES.md?
            if grep -q "$grove" GROVES.md; then
              echo "  ✓ Registered in GROVES.md"
            else
              echo "  ✗ Not found in GROVES.md — add an entry to the registry"
              ERRORS=$((ERRORS + 1))
            fi

          done

          echo ""
          if [[ $ERRORS -eq 0 ]]; then
            echo "All Grove checks passed."
          else
            echo "$ERRORS error(s) found. Fix before merging."
            exit 1
          fi

      - name: Check GROVES.md updated (if Grove added)
        if: steps.changed.outputs.groves != ''
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -q '^GROVES.md$'; then
            echo "✓ GROVES.md updated"
          else
            echo "△ GROVES.md was not modified — ensure new Groves are registered."
          fi
